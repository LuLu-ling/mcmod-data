name: Sync mcmod.buf to PCL-CE

on:
  release:
    types: [published]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Download mcmod.buf from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ github.event.release.tag_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "mcmod.buf"

      - name: Checkout PCL-CE repo
        uses: actions/checkout@v4
        with:
          repository: PCL-Community/PCL-CE
          ref: dev
          token: ${{ secrets.PAT_PCL_CE }}
          path: pcl-ce

      - name: Compare mcmod.buf
        id: compare
        run: |
          PCLCE_FILE="pcl-ce/Plain Craft Launcher 2/Resources/mcmod.buf"
          if [ -f "$PCLCE_FILE" ]; then
            NEW_SHA=$(sha256sum mcmod.buf | cut -d' ' -f1)
            OLD_SHA=$(sha256sum "$PCLCE_FILE" | cut -d' ' -f1)
            echo "new_sha=$NEW_SHA" >> "$GITHUB_OUTPUT"
            echo "old_sha=$OLD_SHA" >> "$GITHUB_OUTPUT"
            if [ "$NEW_SHA" = "$OLD_SHA" ]; then
              echo "changed=false" >> "$GITHUB_OUTPUT"
              echo "No changes - mcmod.buf is identical to PCL-CE version"
            else
              echo "changed=true" >> "$GITHUB_OUTPUT"
              echo "mcmod.buf has changed, will create sync PR"
            fi
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "mcmod.buf not found in PCL-CE, will create"
          fi

      - name: Check existing PR
        id: check_pr
        if: steps.compare.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT_PCL_CE }}
        run: |
          PR_EXISTS=$(gh pr list \
            --repo PCL-Community/PCL-CE \
            --head "chore/upgrade-mcmod-data" \
            --state open \
            --json number \
            --jq 'length')
          if [ "$PR_EXISTS" -gt 0 ]; then
            echo "PR already exists for chore/upgrade-mcmod-data, stopping"
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Import GPG key
        if: steps.check_pr.outputs.proceed == 'true'
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ''
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Create branch and push
        if: steps.check_pr.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT_PCL_CE }}
        run: |
          cd pcl-ce
          BRANCH="chore/upgrade-mcmod-data"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/PCL-Community/PCL-CE.git"
          git switch -c "$BRANCH"
          cp ../mcmod.buf "Plain Craft Launcher 2/Resources/mcmod.buf"
          git add "Plain Craft Launcher 2/Resources/mcmod.buf"
          git commit -S -m "chore: upgrade mcmod.buf"
          git push origin "$BRANCH"

      - name: Create Pull Request
        if: steps.check_pr.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT_PCL_CE }}
        run: |
          gh pr create \
            --repo PCL-Community/PCL-CE \
            --base dev \
            --head "chore/upgrade-mcmod-data" \
            --title "chore: upgrade mcmod.buf" \
            --body "Auto-generated from [${{ github.repository }}](https://github.com/${{ github.repository }}) release [${{ github.event.release.tag_name }}](https://github.com/${{ github.repository }}/releases/tag/${{ github.event.release.tag_name }})."
