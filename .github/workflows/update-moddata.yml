name: Update mcmod.buf from PCL

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Download PCL WikiEntries.txt
        run: |
          curl -sL "https://raw.githubusercontent.com/Meloong-Git/PCL/main/PCLCS/Resource/WikiEntries.txt" -o moddata.txt

      - name: Generate mcmod.buf
        run: dotnet run -- moddata.txt

      - name: Compare with latest release
        id: compare
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NEW_SHA=$(sha256sum mcmod.buf | cut -d' ' -f1)
          echo "new=$NEW_SHA" >> "$GITHUB_OUTPUT"

          LATEST=$(gh release view --repo "${{ github.repository }}" --json tagName 2>/dev/null || true)
          if [ -z "$LATEST" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          gh release download --repo "${{ github.repository }}" --pattern "mcmod.buf" -O mcmod-latest.buf 2>/dev/null || true
          if [ ! -f mcmod-latest.buf ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          OLD_SHA=$(sha256sum mcmod-latest.buf | cut -d' ' -f1)
          if [ "$NEW_SHA" = "$OLD_SHA" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        id: create-release
        if: steps.compare.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_NAME="$(TZ=Asia/Shanghai date +%Y-%m-%d-%H%M)"
          REL_TITLE="$(TZ=Asia/Shanghai date +%Y/%m/%d/%H:%M)"
          echo 'Auto-generated from PCL WikiEntries.txt' > release-notes.md
          echo '' >> release-notes.md
          echo 'Source: https://github.com/Meloong-Git/PCL/blob/main/PCLCS/Resource/WikiEntries.txt' >> release-notes.md
          gh release create "$TAG_NAME" mcmod.buf \
            --repo "${{ github.repository }}" \
            --title "$REL_TITLE" \
            --notes-file release-notes.md
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Checkout PCL-Community/PCL-CE
        if: steps.compare.outputs.changed == 'true'
        uses: actions/checkout@v4
        with:
          repository: PCL-Community/PCL-CE
          ref: dev
          token: ${{ secrets.PAT_PCL_CE }}
          path: pcl-ce

      - name: Compare with PCL-CE mcmod.buf
        id: compare_pclce
        if: steps.compare.outputs.changed == 'true'
        run: |
          PCLCE_FILE="pcl-ce/Plain Craft Launcher 2/Resources/mcmod.buf"
          if [ -f "$PCLCE_FILE" ]; then
            NEW_SHA=$(sha256sum mcmod.buf | cut -d' ' -f1)
            OLD_SHA=$(sha256sum "$PCLCE_FILE" | cut -d' ' -f1)
            if [ "$NEW_SHA" = "$OLD_SHA" ]; then
              echo "changed=false" >> "$GITHUB_OUTPUT"
              echo "mcmod.buf identical to PCL-CE, skipping sync"
            else
              echo "changed=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check existing PR
        id: check_pr
        if: steps.compare_pclce.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT_PCL_CE }}
        run: |
          PR_EXISTS=$(gh pr list \
            --repo PCL-Community/PCL-CE \
            --head "chore/update-mcmod-data" \
            --state open \
            --json number \
            --jq 'length')
          if [ "$PR_EXISTS" -gt 0 ]; then
            echo "PR already exists, skipping"
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Import GPG key
        if: steps.check_pr.outputs.proceed == 'true'
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ''
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Create branch and push
        if: steps.check_pr.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT_PCL_CE }}
        run: |
          cd pcl-ce
          BRANCH="chore/update-mcmod-data"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/PCL-Community/PCL-CE.git"
          git config user.name "LuLu-ling"
          git config user.email "LuLu-ling@outlook.com"
          git switch -c "$BRANCH"
          cp ../mcmod.buf "Plain Craft Launcher 2/Resources/mcmod.buf"
          git add "Plain Craft Launcher 2/Resources/mcmod.buf"
          git commit -S -m "chore: update mcmod.buf"
          git push origin "$BRANCH"

      - name: Create Pull Request
        if: steps.check_pr.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT_PCL_CE }}
        run: |
          gh pr create \
            --repo PCL-Community/PCL-CE \
            --base dev \
            --head "chore/update-mcmod-data" \
            --title "chore: update mcmod.buf" \
            --body "Auto-generated from [${{ github.repository }}](https://github.com/${{ github.repository }}) release [${{ steps.create-release.outputs.tag_name }}](https://github.com/${{ github.repository }}/releases/tag/${{ steps.create-release.outputs.tag_name }})."
