name: Update mcmod.buf from PCL

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Download PCL moddata.txt
        run: |
          curl -sL "https://raw.githubusercontent.com/Meloong-Git/PCL/main/Plain%20Craft%20Launcher%202/Resources/moddata.txt" -o moddata.txt

      - name: Generate mcmod.buf
        run: dotnet run -- moddata.txt

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_NAME="$(date -u +%Y-%m-%d-%H%M)"
          REL_TITLE="$(date -u +%Y/%m/%d/%H:%M)"
          gh release create "$TAG_NAME" mcmod.buf \
            --repo "${{ github.repository }}" \
            --title "$REL_TITLE" \
            --notes "Auto-generated from PCL moddata.txt" \
            --generate-notes
