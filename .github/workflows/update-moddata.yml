name: Update mcmod.buf from PCL

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Download PCL moddata.txt
        run: |
          curl -sL "https://raw.githubusercontent.com/Meloong-Git/PCL/main/Plain%20Craft%20Launcher%202/Resources/moddata.txt" -o moddata.txt

      - name: Generate mcmod.buf
        run: dotnet run -- moddata.txt

      - name: Compare with latest release
        id: compare
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NEW_SHA=$(sha256sum mcmod.buf | cut -d' ' -f1)
          echo "new=$NEW_SHA" >> "$GITHUB_OUTPUT"

          LATEST=$(gh release view --repo "${{ github.repository }}" --json tagName 2>/dev/null || true)
          if [ -z "$LATEST" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          gh release download --repo "${{ github.repository }}" --pattern "mcmod.buf" -O mcmod-latest.buf 2>/dev/null || true
          if [ ! -f mcmod-latest.buf ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          OLD_SHA=$(sha256sum mcmod-latest.buf | cut -d' ' -f1)
          if [ "$NEW_SHA" = "$OLD_SHA" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        if: steps.compare.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_NAME="$(TZ=Asia/Shanghai date +%Y-%m-%d-%H%M)"
          REL_TITLE="$(TZ=Asia/Shanghai date +%Y/%m/%d/%H:%M)"
          echo 'Auto-generated from PCL moddata.txt' > release-notes.md
          echo '' >> release-notes.md
          echo 'Source: https://github.com/Meloong-Git/PCL/blob/main/Plain%20Craft%20Launcher%202/Resources/moddata.txt' >> release-notes.md
          gh release create "$TAG_NAME" mcmod.buf \
            --repo "${{ github.repository }}" \
            --title "$REL_TITLE" \
            --notes-file release-notes.md
